# SDL2XInput Configuration File
# Copy this file to config.toml and launch with: sdl2xinput.exe --config config.toml
#
# All keys are optional. Omitted keys use their default (identity) values.

# ─── Button Remapping ──────────────────────────────────────────────────────────
# Maps each PHYSICAL button (SDL3 name) to a VIRTUAL Xbox 360 button.
#
# Physical button names (left side):
#   south, east, west, north              → face buttons
#   start, back, guide                    → menu / system
#   left_stick, right_stick               → stick clicks
#   left_shoulder, right_shoulder         → bumpers
#   dpad_up, dpad_down, dpad_left, dpad_right
#
# Valid virtual Xbox 360 targets (right side):
#   a, b, x, y
#   start, back, guide
#   left_stick, right_stick
#   left_shoulder, right_shoulder
#   dpad_up, dpad_down, dpad_left, dpad_right

[buttons]
# Default layout (Xbox-style, no remapping needed):
# south  = "a"
# east   = "b"
# west   = "x"
# north  = "y"

# ── Example: Nintendo Switch Pro Controller layout (swap A↔B and X↔Y) ──
# south = "b"
# east  = "a"
# west  = "y"
# north = "x"

# ── Example: Remap Guide button to Start ──
# guide = "start"

# ─── Axis / Trigger Tweaks ────────────────────────────────────────────────────
[axes]
# Invert individual stick axes (useful for flight sims, etc.)
# invert_left_y  = false
# invert_right_y = false
# invert_left_x  = false
# invert_right_x = false

# Swap left and right triggers
# swap_triggers  = false

# ─── Virtual Mouse (Touchpad) ─────────────────────────────────────────────────
# Requires a physical controller with a touchpad (e.g. DualSense, Steam Controller).
# Controls the virtual mouse cursor.
[mouse]
# Enable or disable the virtual mouse entirely (default: true)
# enabled = true

# Cursor movement sensitivity scalar (default: 1.5)
# sensitivity = 1.5

# Action triggered by a "soft touch" tap gesture (touch & release within 250ms).
# touchpad_soft_action = "MouseLeft"

# Action triggered by a "hard press" (clicking the mechanical switch under the pad).
# touchpad_hard_action = "MouseRight"

# ─── Advanced Touchpad Settings ───
# Maximum allowed finger movement distance (squared) to still register as a tap.
# If your finger rolls or jitters too much when tapping, increase this value.
# Default: 0.005 (approx 7% of the touchpad)
# tap_distance_threshold = 0.005

# Maximum time (in milliseconds) a touch can last to be considered a quick tap.
# tap_time_ms = 350

# Maximum time (in milliseconds) allowed between a tap and a subsequent touch-and-hold
# for it to register as a "tap-and-drag" gesture.
# drag_tap_time_ms = 400

# ─── Virtual Keyboard & Exclusive Routing ─────────────────────────────────────
# Map PHYSICAL gamepad buttons to Virtual Keyboard keys.
# Inputs routed to the keyboard are "exclusive" - they are consumed and WILL NOT
# be sent to the Virtual Xbox Controller (XInput), preventing double-inputs in games!
#
# Valid targets include strings like: "Space", "Enter", "Escape", "Tab", "Shift", 
# "A", "B", "1", "2", "F1", "ArrowUp", "MouseLeft", "MouseRight", etc.

[keyboard]
# Force spawn the keyboard even if no mappings are defined (default: false)
# enabled = false

[keyboard.mapping]
# ── Example: Map the Guide button to Escape, and the 'A' button to Space ──
# guide = "Escape"
# south = "Space"
